services:
  bosonic-simulator:
    build:
      context: ../
      dockerfile: ./server/Dockerfile.release
    image: bosim/${DEPLOY_ENV}:${GIT_COMMIT_HASH}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: "--settings /workspace/server/.envs/${DEPLOY_ENV}.json"
    restart: always
    tty: true
    init: true
    logging:
      driver: "local"
      options:
        max-size: "20M"
        max-file: "10"
    secrets:
      - scheduler_token
    volumes:
      - app-log:/var/log/bosonic-simulator
      - app-backup:/var/backup/bosonic-simulator

  fluent-bit:
    image: amazon/aws-for-fluent-bit:latest
    volumes:
      - app-log:/var/log/bosonic-simulator:ro
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    restart: always
    environment:
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      LOG_GROUP_NAME: ${LOG_GROUP_NAME}
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      ROLE_ARN: "arn:aws:iam::058264228024:role/Administrator"

volumes:
  app-log:
  app-backup:
secrets:
  scheduler_token:
    file: ./security/token.txt
